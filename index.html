    <script>
      function redirectWithParams(destination) {
        var currentParams = window.location.search;

        if (!currentParams) {
          window.location.href = destination;
          return;
        }

        if (destination.includes("?")) {
          window.location.href = destination + "&" + currentParams.substring(1);
        } else {
          window.location.href = destination + currentParams;
        }
      }
    </script>
    <script>
      // Back Redirect - Acionado quando o usuário clica em Voltar no navegador
      const link = 'https://backredirectsst.vercel.app'; // Adicionado https:// para garantir o redirecionamento correto para fora do site atual

      function setBackRedirect(url) {
        let urlBackRedirect = url;
        urlBackRedirect =
          urlBackRedirect.trim() +
          (urlBackRedirect.indexOf('?') > 0 ? '&' : '?') +
          document.location.search.replace('?', '').toString();

        history.pushState({}, '', location.href);
        history.pushState({}, '', location.href);
        history.pushState({}, '', location.href);

        window.addEventListener('popstate', () => {
          console.log('onpopstate', urlBackRedirect);
          setTimeout(() => {
            location.href = urlBackRedirect;
          }, 1);
        });
      }

      setBackRedirect(link);
    </script>
